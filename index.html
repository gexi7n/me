    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      p {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100vh;
        background-color: #f6f7fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
          sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        padding: 0 20px;
        width: 100%;
        height: 64px;
        background-color: #fff;
        border-bottom: 1px solid #d9d9d9;
      }
      .logoWrapper {
        display: flex;
      }
      .logoWrapper p {
        margin-left: 14px;
        color: var(
          --Labels-Secondary,
          var(--Labels-Secondary, rgba(60, 60, 67, 0.6))
        );
        font-size: 20px;
        font-style: normal;
        font-weight: 700;
        line-height: 28px;
        text-align: center;
      }
      .container {
        display: flex;
        padding: 12px 20px;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        overflow: hidden;
      }
      .static-bar {
        display: flex;
        align-items: flex-end;
        gap: 20px;
        align-self: stretch;
      }
      .static-title {
        flex: 1 0 0;
        color: var(--Labels-Primary, var(--Labels-Primary, #000));
        font-feature-settings: "liga" off, "clig" off;
        font-size: 24px;
        font-style: normal;
        font-weight: 700;
        line-height: 32px; /* 133.333% */
        letter-spacing: 0.38px;
      }
      .status-wrapper {
        display: flex;
        align-items: center;
        gap: 40px;
      }
      .device-status {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .device-icon {
        display: flex;
        width: 24px;
        height: 24px;
        border-radius: 4px;
        background: var(--Colors-Indigo, #5856d6);
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      .alert-status {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .alert-icon {
        display: flex;
        width: 24px;
        height: 24px;
        border-radius: 4px;
        background: #ec221f;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      #status-grids {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        align-self: stretch;
        overflow: auto;
      }
      .grids-header {
        display: flex;
        align-items: center;
        gap: 4px;
        align-self: stretch;
      }
      .device-grid {
        width: 8px;
        height: 8px;
        background: #ececf4;
      }
      #th-container {
        display: flex;
        flex: 1;
        gap: 4px;
      }
      .th-cell {
        flex: 1;
        min-width: 47px;
        display: flex;
        align-items: center;
        gap: 4px;
        align-self: stretch;
        color: var(
          --Labels-Secondary,
          var(--Labels-Secondary, rgba(60, 60, 67, 0.6))
        );
        text-align: center;
        -size: 12px;
        -style: normal;
        -weight: 500;
        line-height: 22px; /* 183.333% */
      }
      .row {
        display: flex;
        align-items: center;
        gap: 4px;
        align-self: stretch;
      }
      .purple {
        background-color: #5856d6;
      }
      .day-grid {
        display: flex;
        align-items: flex-start;
        gap: 1px;
        flex: 1 0 0;
      }
      .hour-grid {
        height: 8px;
        width: 1px;
        border-radius: 1px;
        background: #14ae5c;
      }
      #time-grid-container {
        display: flex;
        flex: 1;
        gap: 4px;
      }
    </style>
  </head>

        <div class="grids-header">
          <div class="device-grid"></div>
          <div id="th-container"></div>
        </div>
        <div class="row">
          <div class="device-grid purple"></div>
          <div id="time-grid-container"></div>
        </div>
      </div>
    </div>
    <script>
      // 获取要插入 div 的容器
      const thContainer = document.getElementById("th-container");
      const timeGridContainer = document.getElementById("time-grid-container");
      const statusGrids = document.getElementById("status-grids");
      const timeRow = document.querySelector(".row");
      console.log(timeRow);

      // 循环生成 10 个 div
      for (let i = 1; i <= 31; i++) {
        // 创建新的 div 元素
        const thGrid = document.createElement("div");
        // 设置 div 的内容
        thGrid.textContent = `${i}`;
        thGrid.className = "th-cell";
        // 将新 div 添加到容器中
        thContainer.appendChild(thGrid);
      }
      for (let i = 1; i <= 31; i++) {
        const dayGrid = document.createElement("div");
        dayGrid.className = "day-grid";
        for (let i = 1; i <= 24; i++) {
          const hourGrid = document.createElement("div");
          hourGrid.className = "hour-grid";
          dayGrid.appendChild(hourGrid);
        }
        timeGridContainer.appendChild(dayGrid);
      }

      for (i = 1; i <= 100; i++) {
        const cloneRow = timeRow.cloneNode(true);
        statusGrids.appendChild(cloneRow);
      }
    </script>
